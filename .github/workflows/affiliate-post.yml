name: Affiliate Candidate Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate post candidates
        run: node src/index.js
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}

      - name: Commit updated price history / candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price-history.json data/post-candidates.json
          git diff --cached --quiet || git commit -m "chore: 投稿候補と価格履歴を更新"
          git push

      - name: Build page artifact
        run: |
          mkdir -p docs/data
          cp data/post-candidates.json docs/data/post-candidates.json

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy page
        id: deployment
        uses: actions/deploy-pages@v4
