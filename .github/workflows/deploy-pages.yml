name: Deploy Candidate App

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'data/post-candidates.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build page artifact
        run: |
          mkdir -p docs/data
          cp data/post-candidates.json docs/data/post-candidates.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
