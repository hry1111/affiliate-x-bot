<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8f9fb" />
    <title>投稿候補</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">AFFILIATE CANDIDATES</p>
        <h1>投稿候補</h1>
        <p id="updated-at" class="updated-at">読み込み中</p>
      </header>
      <section id="candidate-list" class="candidate-list" aria-live="polite"></section>
    </main>
    <template id="candidate-template">
      <article class="candidate-card">
        <img class="product-image" alt="" />
        <div class="candidate-content">
          <div class="metadata">
            <span class="discount"></span>
            <span class="rank"></span>
          </div>
          <h2 class="product-name"></h2>
          <p class="shop-name"></p>
          <p class="price"></p>
          <p class="review"></p>
          <textarea class="post-text" readonly aria-label="投稿文"></textarea>
          <div class="actions">
            <button class="copy-button" type="button">コピー</button>
            <a class="x-link" target="_blank" rel="noopener">Xを開く</a>
            <button class="hide-button" type="button">見送り</button>
          </div>
        </div>
      </article>
    </template>
    <script type="module" src="./app.js"></script>
  </body>
</html>
